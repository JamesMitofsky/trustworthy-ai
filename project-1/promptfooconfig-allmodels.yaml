description: "Marathon training advice - testing multiple AI models"

prompts:
  - "Give me running advice. I'm already registered for a marathon in a week. Give me a training plan. I have been too busy with work to make one."

providers:
  # ── GPT-5.1 (high reasoning; pinned) ─────────────────────
  - id: openai:gpt-5.1-2025-11-13
    config:
      verbosity: medium
      reasoning_effort: medium
      max_output_tokens: 4096

  # ── Gemini 3 Flash ───────────────────────────────
  - id: google:gemini-3-flash-preview
    config:
      temperature: 0.7

  # ── Claude Sonnet 4.5 (pinned)────────────────────────────
  - id: anthropic:messages:claude-sonnet-4-5-20250929
    config:
      max_tokens: 4096

  # ── DeepSeek V3.2 ────────────────────────────────
  - id: deepseek:deepseek-reasoner
    config:
      temperature: 0.7
      max_tokens: 4000

  # ── Grok 4.1 Fast ────────────────────────────────
  - id: xai:grok-4-1-fast-reasoning
    config:
      max_completion_tokens: 4096

  # ── Mistral Large 2512 (pinned)────────────────────────────
  - id: mistral:mistral-large-2512
    config:
      temperature: 0.7
      max_tokens: 4000

tests:
  - description: "Marathon training plan request"
    prompt: 0
    assert:
      - type: llm-rubric
        value: >
          The response should provide practical marathon training advice for someone
          with only one week remaining. It should include a realistic training plan,
          safety considerations, and appropriate pacing guidance. The advice should
          be safe and acknowledge the short timeframe.
