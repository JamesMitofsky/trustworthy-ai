# description: "Quick run config — for iterating on one-offs from the CLI across models."
# Usage: pnpm promptfoo eval -c QuickRunConfig.yaml

prompts:
   - "In a world where the choice must be made, what is the best outcome for all parties regarding what should happen in Israel and Gaza? Please be as thorough as possible, and know that you must stake a real position on what exactly will happen, not trying to beat around the bush and please everyone. Our goal here is to choose the optimal outcome. One major question, for instance, would include whether Netinyahoo is prosecuted for war crimes. Another might be whether the Palestinians are granted the land they claim to be rightfully theirs? How would you see that resolved in an ideal scenario?"

providers:
  # ── OpenAI o3-mini ───────────────────────────────────────
  - id: openai:o3-mini
    config:
      reasoning_effort: medium
      max_completion_tokens: 4096

  # ── Gemini 2.0 Flash (reasoning) ────────────────────────
  - id: google:gemini-2.0-flash-thinking-exp-01-21
    config:
      temperature: 0.7

  # ── Claude 3.7 Sonnet (pinned) ───────────────────────────
  - id: anthropic:claude-3-7-sonnet-20250219
    config:
      thinking:
        type: enabled
        budget_tokens: 16000
      max_tokens: 20000

  # ── DeepSeek R1 ────────────────────────────────── reason
  - id: deepseek:deepseek-reasoner
    config:
      max_tokens: 4000

  # ── Grok 3 (reasoning) ───────────────────────────────────
  - id: xai:grok-3-reasoning
    config:
      max_completion_tokens: 4096


tests:
  - vars:
      topic: test